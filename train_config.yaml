# ============================================================
# 文化感知跨语言安全对齐 — 训练配置
# ============================================================

training:
  base_model: "/path/to/mdeberta-v3-base"   # 本地模型路径，改这里
  max_length: 256                 # 最大 token 长度，内容审核文本一般 128-256 够用
  batch_size: 32                  # 16GB 显存可以用 32，加快训练
  learning_rate: 0.0001           # LoRA 推荐 1e-4 到 5e-4，fp32 用保守值
  num_epochs: 10                  # 训练轮数，配合 early_stopping 自动停
  warmup_ratio: 0.1               # 前 10% steps 线性 warmup
  weight_decay: 0.01              # L2 正则化
  eval_steps: 20                  # 每隔 N 步验证一次
  logging_steps: 10               # 每隔 N 步打印 loss
  save_best: true                 # 保留验证集最优模型
  early_stopping_patience: 3      # 验证集 N 轮不提升则停止
  seed: 42
  cpu_batch_size: 2               # CPU 退化用，GPU 机器忽略

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: ["query_proj", "value_proj"]   # DeBERTa V3 的 attention 模块名

data:
  input_dir: "data_csv"            # 数据目录 (已包含在 git 中，直接可用)
  taxonomy_dir: "taxonomy"         # Taxonomy JSON 所在目录
  output_dir: "trained_models"     # 训练好的模型保存目录
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  min_samples_per_label: 50        # 每个 label 最少样本数，不足则跳过
  pos_neg_ratio: 1.0               # 训练时正负样本比例 (1.0 = 1:1)

focal_loss:
  gamma_map:
    keyword_sensitive: 0.0         # 标准交叉熵
    contextual: 2.0                # 强 Focal Loss
    hybrid: 1.0                    # 中等 Focal Loss
  alpha: 0.25                      # 正样本权重平衡因子
  reduction: "mean"
